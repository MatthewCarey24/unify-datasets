[data]
mode = "joint"
dfp_dir = "/data/dataset/DFP"
cns_dir = "/data/dataset/CNS"
n_bins = 825
batch_size = 1024

[model]
hidden_dims = [512, 256, 128]
embed_dim = 128

[loss]
type = "supcon"
temperature = 0.07

[optimizer]
lr = 1e-3
weight_decay = 1e-4
max_steps = 20000

[run]
seed = 42
output_dir = "outputs/D_joint"
