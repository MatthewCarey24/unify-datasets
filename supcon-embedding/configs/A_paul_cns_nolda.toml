[data]
mode = "cns"
dfp_dir = "/data/dataset/DFP"
cns_dir = "/data/dataset/CNS"
n_bins = 825
use_lda = false
batch_size = 256

[model]
hidden_dims = [512, 256, 128]
embed_dim = 128

[loss]
type = "paul_cns"
temperature = 0.30

[optimizer]
lr = 1e-3
weight_decay = 1e-4
max_steps = 5000

[run]
seed = 42
output_dir = "outputs/A_cns_nolda"
