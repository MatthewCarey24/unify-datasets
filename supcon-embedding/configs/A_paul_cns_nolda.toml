[data]
mode = "cns"
dfp_dir = "/data/dataset/DFP"
cns_dir = "/data/dataset/CNS"
use_lda = false
batch_size = 1024

[model]
hidden_dims = [128, 128]
embed_dim = 128

[loss]
temperature = 0.07

[optimizer]
lr = 5e-3
weight_decay = 1e-4
max_steps = 20000

[run]
seed = 42
output_dir = "outputs/A_cns_nolda"
