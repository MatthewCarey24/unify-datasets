[data]
mode = "dfp"
dfp_dir = "/data/dataset/DFP"
cns_dir = "/data/dataset/CNS"
n_bins = 825
use_lda = true
batch_size = 1024

[model]
hidden_dims = [512, 256, 128]
embed_dim = 128

[loss]
type = "paul_dfp"
temperature = 0.07

[optimizer]
lr = 5e-3
weight_decay = 1e-4
max_steps = 20000

[run]
seed = 42
output_dir = "outputs/A_dfp_lda"
